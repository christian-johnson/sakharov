# Everforest Dark (medium) — after sainnhe/everforest
name = "Everforest"

[palette]
bg_dim  = "#232a2e"
bg0     = "#2d353b"
bg1     = "#343f44"
bg3     = "#475258"
bg5     = "#56635f"
grey0   = "#7a8478"
grey1   = "#859289"
grey2   = "#9da9a0"
fg      = "#d3c6aa"
red     = "#e67e80"
orange  = "#e69875"
yellow  = "#dbbc7f"
green   = "#a7c080"
aqua    = "#83c092"
blue    = "#7fbbb3"
purple  = "#d699b6"

[ui]
background      = "bg0"
foreground      = "fg"
dim             = "grey1"
line_numbers    = "bg5"
selection       = "bg3"
accent          = "orange"
error           = "red"
warning         = "yellow"
info            = "blue"
success         = "green"
statusline      = "bg_dim"
popup           = "bg_dim"
popup_border    = "bg5"
popup_selection = "bg3"

[syntax]
comment     = "grey1"
keyword     = "red"
function    = "green"
string      = "aqua"
type        = "yellow"
constant    = "purple"
variable    = "fg"
property    = "blue"
parameter   = "blue"
operator    = "orange"
punctuation = "grey2"
namespace   = "aqua"
tag         = "orange"

[modes]
normal = "green"
goto   = "purple"
