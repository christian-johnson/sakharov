# Catppuccin Mocha — after catppuccin/catppuccin
name = "Catppuccin Mocha"

[palette]
base     = "#1e1e2e"
mantle   = "#181825"
surface0 = "#313244"
surface1 = "#45475a"
overlay0 = "#6c7086"
overlay2 = "#9399b2"
text     = "#cdd6f4"
lavender = "#b4befe"
blue     = "#89b4fa"
sapphire = "#74c7ec"
sky      = "#89dceb"
teal     = "#94e2d5"
green    = "#a6e3a1"
yellow   = "#f9e2af"
peach    = "#fab387"
maroon   = "#eba0ac"
red      = "#f38ba8"
mauve    = "#cba6f7"
pink     = "#f5c2e7"

[ui]
background      = "base"
foreground      = "text"
dim             = "overlay0"
line_numbers    = "surface1"
selection       = "surface1"
accent          = "peach"
error           = "red"
warning         = "yellow"
info            = "sapphire"
success         = "green"
statusline      = "mantle"
popup           = "mantle"
popup_border    = "surface1"
popup_selection = "surface0"

[syntax]
comment     = "overlay0"
keyword     = "mauve"
function    = "blue"
string      = "green"
type        = "yellow"
constant    = "peach"
variable    = "text"
property    = "lavender"
parameter   = "maroon"
operator    = "sky"
punctuation = "overlay2"
namespace   = "lavender"
tag         = "pink"
attribute   = "peach"
