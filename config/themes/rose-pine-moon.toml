# Rosé Pine Moon — after rose-pine/neovim
name = "Rosé Pine Moon"

[palette]
base    = "#232136"
surface = "#2a273f"
overlay = "#393552"
muted   = "#6e6a86"
subtle  = "#908caa"
text    = "#e0def4"
love    = "#eb6f92"
gold    = "#f6c177"
rose    = "#ea9a97"
pine    = "#3e8fb0"
foam    = "#9ccfd8"
iris    = "#c4a7e7"
hl_med  = "#44415a"
hl_high = "#56526e"

[ui]
background      = "base"
foreground      = "text"
dim             = "muted"
line_numbers    = "hl_med"
selection       = "hl_med"
accent          = "gold"
error           = "love"
warning         = "gold"
info            = "foam"
success         = "pine"
statusline      = "surface"
popup           = "surface"
popup_border    = "hl_high"
popup_selection = "overlay"

[syntax]
comment     = "muted"
keyword     = "pine"
function    = "rose"
string      = "gold"
type        = "foam"
constant    = "iris"
variable    = "text"
property    = "foam"
parameter   = "iris"
operator    = "subtle"
punctuation = "subtle"
namespace   = "foam"
tag         = "love"

[modes]
normal = "rose"
goto   = "iris"
