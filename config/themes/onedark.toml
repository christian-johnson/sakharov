# One Dark — after the Atom One Dark theme
name = "One Dark"

[palette]
bg        = "#282c34"
bg_dark   = "#21252b"
selection = "#3e4451"
fg        = "#abb2bf"
grey      = "#5c6370"
line_nr   = "#4b5263"
red       = "#e06c75"
green     = "#98c379"
yellow    = "#e5c07b"
blue      = "#61afef"
purple    = "#c678dd"
cyan      = "#56b6c2"
orange    = "#d19a66"

[ui]
background      = "bg"
foreground      = "fg"
dim             = "grey"
line_numbers    = "line_nr"
selection       = "selection"
accent          = "orange"
error           = "red"
warning         = "yellow"
info            = "cyan"
success         = "green"
statusline      = "bg_dark"
popup           = "bg_dark"
popup_border    = "line_nr"
popup_selection = "selection"

[syntax]
comment     = "grey"
keyword     = "purple"
function    = "blue"
string      = "green"
type        = "yellow"
constant    = "orange"
variable    = "fg"
property    = "red"
parameter   = "red"
operator    = "cyan"
punctuation = "fg"
namespace   = "yellow"
tag         = "red"
attribute   = "orange"
