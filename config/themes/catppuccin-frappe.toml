# Catppuccin Frappé — after catppuccin/catppuccin
name = "Catppuccin Frappé"

[palette]
base     = "#303446"
mantle   = "#292c3c"
surface0 = "#414559"
surface1 = "#51576d"
overlay0 = "#737994"
overlay2 = "#949cbb"
text     = "#c6d0f5"
lavender = "#babbf1"
blue     = "#8caaee"
sapphire = "#85c1dc"
sky      = "#99d1db"
teal     = "#81c8be"
green    = "#a6d189"
yellow   = "#e5c890"
peach    = "#ef9f76"
maroon   = "#ea999c"
red      = "#e78284"
mauve    = "#ca9ee6"
pink     = "#f4b8e4"

[ui]
background      = "base"
foreground      = "text"
dim             = "overlay0"
line_numbers    = "surface1"
selection       = "surface1"
accent          = "peach"
error           = "red"
warning         = "yellow"
info            = "sapphire"
success         = "green"
statusline      = "mantle"
popup           = "mantle"
popup_border    = "surface1"
popup_selection = "surface0"

[syntax]
comment     = "overlay0"
keyword     = "mauve"
function    = "blue"
string      = "green"
type        = "yellow"
constant    = "peach"
variable    = "text"
property    = "lavender"
parameter   = "maroon"
operator    = "sky"
punctuation = "overlay2"
namespace   = "lavender"
tag         = "pink"
attribute   = "peach"
