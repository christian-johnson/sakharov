# Catppuccin Macchiato — after catppuccin/catppuccin
name = "Catppuccin Macchiato"

[palette]
base     = "#24273a"
mantle   = "#1e2030"
surface0 = "#363a4f"
surface1 = "#494d64"
overlay0 = "#6e738d"
overlay2 = "#939ab7"
text     = "#cad3f5"
lavender = "#b7bdf8"
blue     = "#8aadf4"
sapphire = "#7dc4e4"
sky      = "#91d7e3"
teal     = "#8bd5ca"
green    = "#a6da95"
yellow   = "#eed49f"
peach    = "#f5a97f"
maroon   = "#ee99a0"
red      = "#ed8796"
mauve    = "#c6a0f6"
pink     = "#f5bde6"

[ui]
background      = "base"
foreground      = "text"
dim             = "overlay0"
line_numbers    = "surface1"
selection       = "surface1"
accent          = "peach"
error           = "red"
warning         = "yellow"
info            = "sapphire"
success         = "green"
statusline      = "mantle"
popup           = "mantle"
popup_border    = "surface1"
popup_selection = "surface0"

[syntax]
comment     = "overlay0"
keyword     = "mauve"
function    = "blue"
string      = "green"
type        = "yellow"
constant    = "peach"
variable    = "text"
property    = "lavender"
parameter   = "maroon"
operator    = "sky"
punctuation = "overlay2"
namespace   = "lavender"
tag         = "pink"
attribute   = "peach"
