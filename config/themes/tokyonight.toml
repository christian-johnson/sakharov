# Tokyo Night (night) — after folke/tokyonight.nvim
name = "Tokyo Night"

[palette]
bg        = "#1a1b26"
bg_dark   = "#16161e"
bg_hl     = "#292e42"
fg        = "#c0caf5"
fg_dark   = "#a9b1d6"
grey      = "#565f89"
line_nr   = "#3b4261"
selection = "#283457"
blue      = "#7aa2f7"
cyan      = "#7dcfff"
sky       = "#89ddff"
teal      = "#2ac3de"
purple    = "#bb9af7"
green     = "#9ece6a"
red       = "#f7768e"
orange    = "#ff9e64"
yellow    = "#e0af68"

[ui]
background      = "bg"
foreground      = "fg"
dim             = "grey"
line_numbers    = "line_nr"
selection       = "selection"
accent          = "orange"
error           = "red"
warning         = "yellow"
info            = "cyan"
success         = "green"
statusline      = "bg_dark"
popup           = "bg_dark"
popup_border    = "line_nr"
popup_selection = "bg_hl"

[syntax]
comment     = "grey"
keyword     = "purple"
function    = "blue"
string      = "green"
type        = "teal"
constant    = "orange"
variable    = "fg"
property    = "cyan"
parameter   = "yellow"
operator    = "sky"
punctuation = "fg_dark"
namespace   = "cyan"
tag         = "red"
