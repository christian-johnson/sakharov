# Catppuccin Latte (light) — after catppuccin/catppuccin
name = "Catppuccin Latte"

[palette]
base     = "#eff1f5"
mantle   = "#e6e9ef"
surface0 = "#ccd0da"
surface1 = "#bcc0cc"
overlay0 = "#9ca0b0"
overlay2 = "#7c7f93"
text     = "#4c4f69"
lavender = "#7287fd"
blue     = "#1e66f5"
sapphire = "#209fb5"
sky      = "#04a5e5"
teal     = "#179299"
green    = "#40a02b"
yellow   = "#df8e1d"
peach    = "#fe640b"
maroon   = "#e64553"
red      = "#d20f39"
mauve    = "#8839ef"
pink     = "#ea76cb"

[ui]
background      = "base"
foreground      = "text"
dim             = "overlay0"
line_numbers    = "surface1"
selection       = "surface1"
accent          = "peach"
error           = "red"
warning         = "yellow"
info            = "sapphire"
success         = "green"
statusline      = "mantle"
popup           = "mantle"
popup_border    = "surface1"
popup_selection = "surface0"

[syntax]
comment     = "overlay0"
keyword     = "mauve"
function    = "blue"
string      = "green"
type        = "yellow"
constant    = "peach"
variable    = "text"
property    = "lavender"
parameter   = "maroon"
operator    = "sky"
punctuation = "overlay2"
namespace   = "lavender"
tag         = "pink"
attribute   = "peach"
