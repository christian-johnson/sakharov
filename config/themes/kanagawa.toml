# Kanagawa (wave) — after rebelot/kanagawa.nvim
name = "Kanagawa"

[palette]
sumi_ink0   = "#16161d"
sumi_ink3   = "#1f1f28"
sumi_ink4   = "#2a2a37"
wave_blue2  = "#2d4f67"
sumi_ink6   = "#54546d"
fuji_white  = "#dcd7ba"
fuji_gray   = "#727169"
oni_violet  = "#957fb8"
crystal_blue = "#7e9cd8"
spring_green = "#98bb6c"
wave_aqua2  = "#7aa89f"
surimi_orange = "#ffa066"
sakura_pink = "#d27e99"
boat_yellow = "#c0a36e"
spring_blue = "#7fb4ca"
carp_yellow = "#e6c384"
samurai_red = "#e82424"
ronin_yellow = "#ff9e3b"
wave_red    = "#e46876"

[ui]
background      = "sumi_ink3"
foreground      = "fuji_white"
dim             = "fuji_gray"
line_numbers    = "sumi_ink6"
selection       = "wave_blue2"
accent          = "surimi_orange"
error           = "samurai_red"
warning         = "ronin_yellow"
info            = "spring_blue"
success         = "spring_green"
statusline      = "sumi_ink0"
popup           = "sumi_ink0"
popup_border    = "sumi_ink6"
popup_selection = "sumi_ink4"

[syntax]
comment     = "fuji_gray"
keyword     = "oni_violet"
function    = "crystal_blue"
string      = "spring_green"
type        = "wave_aqua2"
constant    = "surimi_orange"
number      = "sakura_pink"
variable    = "fuji_white"
property    = "carp_yellow"
parameter   = "carp_yellow"
operator    = "boat_yellow"
punctuation = "#9cabca"
namespace   = "wave_aqua2"
tag         = "wave_red"

[modes]
normal = "crystal_blue"
goto   = "oni_violet"
