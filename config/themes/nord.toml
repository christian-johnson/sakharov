# Nord — after nordtheme/nord (polar night / snow storm / frost / aurora)
name = "Nord"

[palette]
nord0  = "#2e3440"
nord1  = "#3b4252"
nord2  = "#434c5e"
nord3  = "#4c566a"
nord3b = "#616e88"   # brightened nord3, the de-facto comment color
nord4  = "#d8dee9"
nord5  = "#e5e9f0"
nord6  = "#eceff4"
nord7  = "#8fbcbb"
nord8  = "#88c0d0"
nord9  = "#81a1c1"
nord10 = "#5e81ac"
nord11 = "#bf616a"
nord12 = "#d08770"
nord13 = "#ebcb8b"
nord14 = "#a3be8c"
nord15 = "#b48ead"

[ui]
background      = "nord0"
foreground      = "nord4"
dim             = "nord3b"
line_numbers    = "nord3"
selection       = "nord2"
accent          = "nord12"
error           = "nord11"
warning         = "nord13"
info            = "nord8"
success         = "nord14"
statusline      = "nord1"
popup           = "nord1"
popup_border    = "nord3"
popup_selection = "nord2"

[syntax]
comment     = "nord3b"
keyword     = "nord9"
function    = "nord8"
string      = "nord14"
type        = "nord7"
constant    = "nord12"
number      = "nord15"
variable    = "nord4"
property    = "nord7"
operator    = "nord9"
punctuation = "nord4"
namespace   = "nord7"
tag         = "nord9"
attribute   = "nord15"
