# Rosé Pine — after rose-pine/neovim ("all natural pine, faux fur and a bit of soho vibes")
name = "Rosé Pine"

[palette]
base    = "#191724"
surface = "#1f1d2e"
overlay = "#26233a"
muted   = "#6e6a86"
subtle  = "#908caa"
text    = "#e0def4"
love    = "#eb6f92"
gold    = "#f6c177"
rose    = "#ebbcba"
pine    = "#31748f"
foam    = "#9ccfd8"
iris    = "#c4a7e7"
hl_med  = "#403d52"
hl_high = "#524f67"

[ui]
background      = "base"
foreground      = "text"
dim             = "muted"
line_numbers    = "hl_med"
selection       = "hl_med"
accent          = "gold"
error           = "love"
warning         = "gold"
info            = "foam"
success         = "pine"
statusline      = "surface"
popup           = "surface"
popup_border    = "hl_high"
popup_selection = "overlay"

[syntax]
comment     = "muted"
keyword     = "pine"
function    = "rose"
string      = "gold"
type        = "foam"
constant    = "iris"
variable    = "text"
property    = "foam"
parameter   = "iris"
operator    = "subtle"
punctuation = "subtle"
namespace   = "foam"
tag         = "love"

[modes]
normal = "rose"
goto   = "iris"
