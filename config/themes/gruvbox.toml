# Gruvbox Dark (medium) — after morhetz/gruvbox
name = "Gruvbox Dark"

[palette]
bg      = "#282828"
bg_hard = "#1d2021"
bg1     = "#3c3836"
bg2     = "#504945"
bg3     = "#665c54"
fg      = "#ebdbb2"
fg4     = "#a89984"
grey    = "#928374"
red     = "#fb4934"
green   = "#b8bb26"
yellow  = "#fabd2f"
blue    = "#83a598"
purple  = "#d3869b"
aqua    = "#8ec07c"
orange  = "#fe8019"

[ui]
background      = "bg"
foreground      = "fg"
dim             = "grey"
line_numbers    = "bg3"
selection       = "bg1"
accent          = "orange"
error           = "red"
warning         = "yellow"
info            = "blue"
success         = "green"
statusline      = "bg_hard"
popup           = "bg_hard"
popup_border    = "bg3"
popup_selection = "bg1"

[syntax]
comment     = "grey"
keyword     = "red"
function    = "green"
string      = "green"
type        = "yellow"
constant    = "purple"
variable    = "fg"
property    = "blue"
parameter   = "blue"
operator    = "orange"
punctuation = "fg4"
namespace   = "aqua"
attribute   = "aqua"
tag         = "red"

[modes]
normal = "yellow"
goto   = "purple"
