# Tokyo Night Moon — after folke/tokyonight.nvim
name = "Tokyo Night Moon"

[palette]
bg        = "#222436"
bg_dark   = "#1e2030"
bg_hl     = "#2f334d"
fg        = "#c8d3f5"
fg_dark   = "#828bb8"
grey      = "#636da6"
line_nr   = "#3b4261"
selection = "#2d3f76"
blue      = "#82aaff"
cyan      = "#86e1fc"
sky       = "#89ddff"
teal      = "#65bcff"
purple    = "#c099ff"
green     = "#c3e88d"
red       = "#ff757f"
orange    = "#ff966c"
yellow    = "#ffc777"

[ui]
background      = "bg"
foreground      = "fg"
dim             = "grey"
line_numbers    = "line_nr"
selection       = "selection"
accent          = "orange"
error           = "red"
warning         = "yellow"
info            = "cyan"
success         = "green"
statusline      = "bg_dark"
popup           = "bg_dark"
popup_border    = "line_nr"
popup_selection = "bg_hl"

[syntax]
comment     = "grey"
keyword     = "purple"
function    = "blue"
string      = "green"
type        = "teal"
constant    = "orange"
variable    = "fg"
property    = "cyan"
parameter   = "yellow"
operator    = "sky"
punctuation = "fg_dark"
namespace   = "cyan"
tag         = "red"
