# Gruvbox Light (medium) — after morhetz/gruvbox
name = "Gruvbox Light"

[palette]
bg      = "#fbf1c7"
bg_soft = "#f2e5bc"
bg1     = "#ebdbb2"
bg2     = "#d5c4a1"
bg3     = "#bdae93"
fg      = "#3c3836"
fg4     = "#7c6f64"
grey    = "#928374"
red     = "#9d0006"
green   = "#79740e"
yellow  = "#b57614"
blue    = "#076678"
purple  = "#8f3f71"
aqua    = "#427b58"
orange  = "#af3a03"

[ui]
background      = "bg"
foreground      = "fg"
dim             = "grey"
line_numbers    = "bg3"
selection       = "bg1"
accent          = "orange"
error           = "red"
warning         = "yellow"
info            = "blue"
success         = "green"
statusline      = "bg1"
popup           = "bg_soft"
popup_border    = "bg3"
popup_selection = "bg1"

[syntax]
comment     = "grey"
keyword     = "red"
function    = "green"
string      = "green"
type        = "yellow"
constant    = "purple"
variable    = "fg"
property    = "blue"
parameter   = "blue"
operator    = "orange"
punctuation = "fg4"
namespace   = "aqua"
attribute   = "aqua"
tag         = "red"

[modes]
normal = "yellow"
goto   = "purple"
