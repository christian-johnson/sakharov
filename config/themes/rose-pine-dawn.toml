# Rosé Pine Dawn (light) — after rose-pine/neovim
name = "Rosé Pine Dawn"

[palette]
base    = "#faf4ed"
surface = "#fffaf3"
overlay = "#f2e9e1"
muted   = "#9893a5"
subtle  = "#797593"
text    = "#575279"
love    = "#b4637a"
gold    = "#ea9d34"
rose    = "#d7827e"
pine    = "#286983"
foam    = "#56949f"
iris    = "#907aa9"
hl_med  = "#dfdad9"
hl_high = "#cecacd"

[ui]
background      = "base"
foreground      = "text"
dim             = "muted"
line_numbers    = "hl_med"
selection       = "hl_med"
accent          = "gold"
error           = "love"
warning         = "gold"
info            = "foam"
success         = "pine"
statusline      = "overlay"
popup           = "surface"
popup_border    = "hl_high"
popup_selection = "overlay"

[syntax]
comment     = "muted"
keyword     = "pine"
function    = "rose"
string      = "gold"
type        = "foam"
constant    = "iris"
variable    = "text"
property    = "foam"
parameter   = "iris"
operator    = "subtle"
punctuation = "subtle"
namespace   = "foam"
tag         = "love"

[modes]
normal = "rose"
goto   = "iris"

[notebook]
output_background = "overlay"
