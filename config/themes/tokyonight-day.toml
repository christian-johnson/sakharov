# Tokyo Night Day (light) — after folke/tokyonight.nvim
name = "Tokyo Night Day"

[palette]
bg        = "#e1e2e7"
bg_dark   = "#e9e9ec"
bg_hl     = "#c4c8da"
fg        = "#3760bf"
fg_dark   = "#6172b0"
grey      = "#848cb5"
line_nr   = "#a8aecb"
selection = "#b6bfe2"
blue      = "#2e7de9"
cyan      = "#007197"
sky       = "#006a83"
teal      = "#07879d"
purple    = "#9854f1"
green     = "#587539"
red       = "#f52a65"
orange    = "#b15c00"
yellow    = "#8c6c3e"

[ui]
background      = "bg"
foreground      = "fg"
dim             = "grey"
line_numbers    = "line_nr"
selection       = "selection"
accent          = "orange"
error           = "red"
warning         = "yellow"
info            = "cyan"
success         = "green"
statusline      = "bg_dark"
popup           = "bg_dark"
popup_border    = "line_nr"
popup_selection = "bg_hl"

[syntax]
comment     = "grey"
keyword     = "purple"
function    = "blue"
string      = "green"
type        = "teal"
constant    = "orange"
variable    = "fg"
property    = "cyan"
parameter   = "yellow"
operator    = "sky"
punctuation = "fg_dark"
namespace   = "cyan"
tag         = "red"

[notebook]
output_background = "bg_dark"
