# Solarized Light — after Ethan Schoonover's Solarized
name = "Solarized Light"

[palette]
base3   = "#fdf6e3"
base2   = "#eee8d5"
base1   = "#93a1a1"
base00  = "#657b83"
base01  = "#586e75"
yellow  = "#b58900"
orange  = "#cb4b16"
red     = "#dc322f"
magenta = "#d33682"
violet  = "#6c71c4"
blue    = "#268bd2"
cyan    = "#2aa198"
green   = "#859900"

[ui]
background      = "base3"
foreground      = "base00"
dim             = "base1"
line_numbers    = "base1"
selection       = "base2"
accent          = "orange"
error           = "red"
warning         = "yellow"
info            = "blue"
success         = "green"
statusline      = "base2"
popup           = "base2"
popup_border    = "base1"
popup_selection = "#e4ddc8"

[syntax]
comment     = "base1"
keyword     = "green"
function    = "blue"
string      = "cyan"
type        = "yellow"
constant    = "magenta"
variable    = "base00"
property    = "blue"
operator    = "base00"
punctuation = "base01"
namespace   = "violet"
attribute   = "orange"
tag         = "blue"

[modes]
normal = "blue"
goto   = "violet"
