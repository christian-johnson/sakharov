[theme]
background = "#1e1e2e"
foreground = "#cdd6f4"
cursor = "#f5e0dc"
selection = "#313244"
line_numbers = "#45475a"

# Per-mode colors for the status-line chip and the hardware cursor.
# Each entry is a #rrggbb hex string.  Omit (or leave empty) to use the
# built-in ANSI fallback for that mode.
#
# [theme.modes]
# normal   = "#5277c3"   # ANSI Blue  (default)
# insert   = "#26a641"   # ANSI Green (default)
# select   = "#cdad00"   # ANSI Yellow (default)
# command  = "#0fb8c9"   # ANSI Cyan  (default)
# notebook = "#0fb8c9"   # ANSI Cyan  (default)
# goto     = "#9141ac"   # ANSI Magenta (default, covers g/f/? sub-modes)
# jump     = "#ffa000"   # orange     (default)
# fold     = "#ffb060"   # light orange (default)

[editor]
tab_width = 4
# When true (default), the Tab key and all auto-indentation insert `tab_width`
# spaces — the editor never writes a literal tab character. Set to false to
# indent with real tabs instead.
expand_tabs = true
line_numbers = true
relative_line_numbers = false
scroll_off = 5
word_wrap = false
git_gutter = true
format_on_save = false
max_undo = 200
file_picker_max_files = 2000
file_picker_max_depth = 10
# Periodically save unsaved buffer contents to a private recovery file under
# $XDG_STATE_HOME/sakharov/recovery (owner-only, 0600) so they can be restored
# after a crash or kill. The file is removed on a clean save and clean quit, so
# it only lingers when something went wrong. Set false to disable entirely.
crash_recovery = true
# file_picker = "yazi --chooser-file=$SV_PICKER_FILE"
# file_picker = "find . -type f | fzf"

# UI / interaction settings.
[ui]
# Character alphabet for 2-char jump labels (gw mode).
# List home-row keys first for best ergonomics; all 26 chars are usable.
# For Dvorak: "aoeuhtns,qjkxbmwvz"
jump_keys = "asdfghjklqwertyuiopzxcvbnm"

# Maximum items shown at once in the completion / symbol-picker popup.
completion_list_height = 15

# Maximum lines shown in documentation / hover popups.
doc_popup_height = 18

# How the command palette remembers recently-used commands and floats them up:
#   "session" — kept in memory only, reset each launch (default)
#   "global"  — persisted to $XDG_STATE_HOME/sakharov/command_history.json
#   "off"     — no recency weighting
# Recency only breaks ties between equally-good fuzzy matches, so a better match
# always still wins.
command_history = "session"

# Badge labels shown next to each symbol kind in completion and symbol-picker
# popups.  Override any entry to use a different icon or text.
# Set a value to "" to hide the badge for that kind.
[ui.symbol_icons]
fn     = "λ fn"
class  = "○ class"
struct = "□ struct"
enum   = "◇ enum"
trait  = "◈ trait"
const  = "# const"
impl   = "⊕ impl"
method = "m mth"
var    = "= var"

# ─── Status line (modeline) ──────────────────────────────────────────────────
#
# Layout is driven by two ordered lists of module names:
#   left  — packed from the left edge
#   right — flush to the right edge
#
# Each module is automatically padded with a leading and trailing space.
# Any name that isn't a known module is rendered as literal text — handy for
# custom separators, e.g.  left = ["mode", "│", "git", "file"]
#
# ┌─────────────┬──────────────────────────────────────┬────────────────────┐
# │ Name(s)     │ Renders as                           │ Visibility         │
# ├─────────────┼──────────────────────────────────────┼────────────────────┤
# │ mode        │ Coloured chip: NOR INS SEL CMD …     │ always             │
# │ file        │ filename  [+] when unsaved           │ always             │
# │ filename    │   (alias for file)                   │                    │
# │ git         │  branch-name (Nerd Font icon)       │ hidden outside repo│
# │ branch      │   (alias for git)                    │                    │
# │ git_branch  │   (alias for git)                    │                    │
# │ diagnostics │ ●N errors (red)  ◆N warnings (yel.) │ hidden when both=0 │
# │ diag        │   (alias for diagnostics)            │                    │
# │ position    │ line:col  (1-based)                  │ always             │
# │ pos         │   (alias for position)               │                    │
# │ scroll      │ N% through the file                  │ always             │
# │ scroll_pct  │   (alias for scroll)                 │                    │
# │ spinner     │ Animated Braille glyph (cyan)        │ hidden when idle   │
# │ cell        │ current/total cell index             │ notebook only      │
# │ cell_pos    │   (alias for cell)                   │                    │
# │ kernel      │ [idle] / [⠿ busy] / [dead] /        │ notebook only      │
# │             │   [no kernel]                        │                    │
# └─────────────┴──────────────────────────────────────┴────────────────────┘
#
# Note: `kernel` folds the live spinner into itself when busy, showing
# "[⠿ busy]" rather than "[busy]".  In the notebook layout there is no need
# to include both `spinner` and `kernel` — `kernel` covers both states.
#
# A separate [statusline.notebook] section overrides the layout when a
# notebook (.ipynb) file is open.  `cell` and `kernel` are notebook-only
# modules and produce nothing in the plain editor, so they are safe to leave
# in the shared lists without harm.
#
# ── separator ────────────────────────────────────────────────────────────────
#
# Controls what appears between adjacent modules.
#
#   Powerline mode — filled transition glyphs (requires Nerd Fonts):
#     ">"     — solid arrow  ► / ◄  (classic powerline look)
#     "/"     — upper diagonal slant  (catppuccin / tokyonight style)
#     "\"     — lower diagonal slant  (reverse of above)
#     "round" — half-circle bubble
#
#   Literal mode — text printed verbatim between modules:
#     "|"  " | "  "·"  etc.
#
#   Default: "" (empty) — relies on each module's own padding; no extra glyph.
#
# ── [statusline.styles] ──────────────────────────────────────────────────────
#
# Per-module colour overrides.  Key = module name, value = #rrggbb hex string.
#
#   Powerline mode : each entry sets the module's *background* colour;
#                    foreground is auto-chosen for contrast (black or white).
#   Literal mode   : each entry sets the module's *foreground* (text) colour.
#
# Example — a dracula-flavoured powerline bar:
#   [statusline]
#   separator = ">"
#   [statusline.styles]
#   mode = "#ff79c6"
#   git  = "#6272a4"
#   file = "#44475a"
#
[statusline]
left  = ["mode", "git", "file"]
right = ["diagnostics", "spinner", "position", "scroll"]
# separator = ">"   # uncomment for powerline arrows (needs Nerd Fonts)

# Layout used while a notebook (.ipynb) is open.
[statusline.notebook]
left  = ["mode", "file"]
right = ["diagnostics", "cell", "kernel"]

# Jupyter notebook settings.
[notebook]
# Maximum terminal rows an image output may occupy.
# The actual height is computed from the image aspect ratio and cell width;
# this value caps it so one large figure doesn't fill the entire screen.
image_rows = 40

# Maximum stdout/stderr lines shown per output block before "… N more lines".
max_output_lines = 20

# Maximum Python traceback lines shown for error outputs.
max_traceback_lines = 5

# Shell formatters — run a CLI tool on the current file.
# These take priority over LSP-based formatting (`:fmt`, format_on_save).
# The command receives the file path as the last argument, e.g. `ruff format <file>`.
#
# [formatters.python]
# command = "ruff"
# args = ["format"]
#
# [formatters.rust]
# command = "rustfmt"

# Language servers — uncomment and adjust to match servers installed on your system.
# sakharov always uses the directory it is launched from as the workspace root, so run
# it from your project root (where pyproject.toml / .venv / Cargo.toml live).
#
# For Python, sakharov locates the project virtualenv by walking up from the
# file's (or notebook's) location looking for .venv / venv / .env / env, and points
# the language server's interpreter at it. If no virtualenv is found the Python
# language server is NOT started — sakharov never resolves imports against the
# system interpreter, so autocomplete is venv-only by design.
#
# Single server (simple):
# [language_servers.python]
# command = "pylsp"
#
# Multiplexed servers — pylsp for intelligence, ruff for code-actions:
# [language_servers.python]
# command = "pylsp"
# # No features = handles everything pylsp doesn't specifically delegate.
#
# [[language_servers.python.extra_servers]]
# command = "ruff"
# args = ["server"]
# features = ["code-actions", "format"]   # ruff wins for ga / code-actions / :fmt
#
# [language_servers.rust]
# command = "rust-analyzer"
# args = []
#
# [language_servers.javascript]
# command = "typescript-language-server"
# args = ["--stdio"]
