[theme]
background = "#1e1e2e"
foreground = "#cdd6f4"
cursor = "#f5e0dc"
selection = "#313244"
line_numbers = "#45475a"

[editor]
tab_width = 4
line_numbers = true
relative_line_numbers = false
scroll_off = 5
word_wrap = false
git_gutter = true
format_on_save = false
max_undo = 200
file_picker_max_files = 2000
file_picker_max_depth = 10
# file_picker = "yazi --chooser-file=$SV_PICKER_FILE"
# file_picker = "find . -type f | fzf"

# UI / interaction settings.
[ui]
# Character alphabet for 2-char jump labels (gw mode).
# List home-row keys first for best ergonomics; all 26 chars are usable.
# For Dvorak: "aoeuhtns,qjkxbmwvz"
jump_keys = "asdfghjklqwertyuiopzxcvbnm"

# Maximum items shown at once in the completion / symbol-picker popup.
completion_list_height = 15

# Maximum lines shown in documentation / hover popups.
doc_popup_height = 18

# Badge labels shown next to each symbol kind in completion and symbol-picker
# popups.  Override any entry to use a different icon or text.
# Set a value to "" to hide the badge for that kind.
[ui.symbol_icons]
fn     = "λ fn"
class  = "○ class"
struct = "□ struct"
enum   = "◇ enum"
trait  = "◈ trait"
const  = "# const"
impl   = "⊕ impl"
method = "m mth"
var    = "= var"

# Jupyter notebook settings.
[notebook]
# Maximum terminal rows an image output may occupy.
# The actual height is computed from the image aspect ratio and cell width;
# this value caps it so one large figure doesn't fill the entire screen.
image_rows = 40

# Maximum stdout/stderr lines shown per output block before "… N more lines".
max_output_lines = 20

# Maximum Python traceback lines shown for error outputs.
max_traceback_lines = 5

# Shell formatters — run a CLI tool on the current file.
# These take priority over LSP-based formatting (`:fmt`, format_on_save).
# The command receives the file path as the last argument, e.g. `ruff format <file>`.
#
# [formatters.python]
# command = "ruff"
# args = ["format"]
#
# [formatters.rust]
# command = "rustfmt"

# Language servers — uncomment and adjust to match servers installed on your system.
# sakharov always uses the directory it is launched from as the workspace root, so run
# it from your project root (where pyproject.toml / .venv / Cargo.toml live).
#
# For Python, sakharov locates the project virtualenv by walking up from the
# file's (or notebook's) location looking for .venv / venv / .env / env, and points
# the language server's interpreter at it. If no virtualenv is found the Python
# language server is NOT started — sakharov never resolves imports against the
# system interpreter, so autocomplete is venv-only by design.
#
# Single server (simple):
# [language_servers.python]
# command = "pylsp"
#
# Multiplexed servers — pylsp for intelligence, ruff for code-actions:
# [language_servers.python]
# command = "pylsp"
# # No features = handles everything pylsp doesn't specifically delegate.
#
# [[language_servers.python.extra_servers]]
# command = "ruff"
# args = ["server"]
# features = ["code-actions", "format"]   # ruff wins for ga / code-actions / :fmt
#
# [language_servers.rust]
# command = "rust-analyzer"
# args = []
#
# [language_servers.javascript]
# command = "typescript-language-server"
# args = ["--stdio"]
